name: fwf
description: Maihama Food Guide App
version: 0.2.0

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_gpu:
    sdk: flutter
  flutter_riverpod: ^3.1.0
  json_serializable: ^6.9.4
  riverpod_annotation: ^4.0.0
  yaml: ^3.1.3
  flutter_sticky_header: ^0.8.0
  flutter_custom_tabs: ^2.2.1
  flutter_map: ^8.1.1
  latlong2: ^0.9.1
  flutter_svg: ^2.0.17
  package_info_plus: ^9.0.0
  google_mobile_ads: ^7.0.0
  vector_map_tiles: ^10.0.0-beta.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner:
  custom_lint:
  riverpod_generator: ^4.0.0+1
  riverpod_lint: ^3.1.0
  freezed: ^3.0.4
  mocktail: ^1.0.4
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true
  assets:
    - assets/icon.svg
    - assets/data/

flutter_launcher_icons:
  android: false
  ios: true
  image_path: "android/app/src/main/ic_launcher-playstore.png"
